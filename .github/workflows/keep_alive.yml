name: Production Backend Keep-Alive

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch: # Manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HexaGene Health Endpoint
        run: |
          curl -s -f https://hexagene-app.onrender.com/health || exit 1
          echo "Backend is warm and healthy."
